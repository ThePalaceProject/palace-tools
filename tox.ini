[tox]
envlist = py312

[testenv]
runner = uv-venv-lock-runner
description = Run pytest tests
commands =
    pytest {posargs:tests}
allowlist_externals =
    pytest

[testenv:mypy]
runner = uv-venv-lock-runner
description = Run mypy type checking
commands =
    mypy
allowlist_externals =
    mypy

[testenv:lint]
runner = uv-venv-lock-runner
description = Run linting checks
dependency_groups = ci
commands =
    pre-commit run --all-files
allowlist_externals =
    pre-commit
